reverse_lookup:
  dictionary: luna_pinyin
  prefix: "`"
  suffix: "'"
  tips: 〔拼音〕
  preedit_format:
    - xform/([nljqxy])v/$1ü/

punctuator:
  import_preset: symbols
  full_shape:
    '<' : [ 《, ⟨, 〈, «, ‹ ]
    '>' : [ 》, ⟩, 〉, », › ]
  half_shape:
    '<' : [ 《, ⟨, 〈, «, ‹ ]
    '>' : [ 》, ⟩, 〉, », › ]

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "`[a-z]*'?$"
    punct: '^/([0-9]0?|[A-Za-z]+)$'